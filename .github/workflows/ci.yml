name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: true

jobs:
  rust:
    name: rust / ${{ matrix.toolchain }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-${{ matrix.toolchain }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-audit,cargo-deny
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: nextest
        run: cargo nextest run --workspace --all-features --no-fail-fast
      - name: cargo audit
        run: cargo audit --deny warnings
      - name: cargo deny
        run: cargo deny check bans licenses sources advisories

  typescript:
    name: typescript / node-${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Biome check
        run: pnpm dlx @biomejs/biome ci .
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Build
        run: pnpm -r build
      - name: Test (vitest)
        run: pnpm -r test

  e2e:
    name: e2e (Playwright)
    needs: [rust, typescript]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: revo_auth
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      REVO_AUTH_DATABASE_URL: postgres://postgres:postgres@localhost:5432/revo_auth
      REVO_AUTH_REDIS_URL: redis://127.0.0.1:6379/0
      REVO_AUTH_HOST: 0.0.0.0
      REVO_AUTH_PORT: 8787
      REVO_AUTH_MASTER_KEY: ci-master-key
      REVO_AUTH_ENCRYPTION_KEY: ci-encryption-key-32-bytes-minimum-length-ok
      REVO_AUTH_JWT_ISSUER: http://localhost:8787
      REVO_AUTH_COOKIE_SECURE: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: docker/setup-buildx-action@v3
      - name: Build server image
        run: docker build -t revo-auth-server:ci -f apps/server/Dockerfile .
      - name: Run server image
        run: |
          docker run -d --name revo-auth \
            --network host \
            -e REVO_AUTH_DATABASE_URL \
            -e REVO_AUTH_REDIS_URL \
            -e REVO_AUTH_HOST \
            -e REVO_AUTH_PORT \
            -e REVO_AUTH_MASTER_KEY \
            -e REVO_AUTH_ENCRYPTION_KEY \
            -e REVO_AUTH_JWT_ISSUER \
            -e REVO_AUTH_COOKIE_SECURE \
            revo-auth-server:ci
      - name: Wait for server
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8787/health >/dev/null; then exit 0; fi
            sleep 1
          done
          docker logs revo-auth
          exit 1
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm -F sveltekit-demo exec playwright install --with-deps
      - name: Run Playwright tests
        run: pnpm -F sveltekit-demo exec playwright test
      - name: Server logs on failure
        if: failure()
        run: docker logs revo-auth
